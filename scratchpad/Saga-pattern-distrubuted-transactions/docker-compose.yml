services:
  main-application:
    depends_on:
      - order-system
      - payment-system
      - order-item
    container_name: mainServer
    build: /server-main/.
    ports:
      - "8080:8080"
    networks:
      - custom-network
    environment:
      SPRING_PROFILE: docker
  order-system:
    container_name: order-server
    build: /server-order/.
    ports:
      - "8091:8080"
    environment:
      SPRING_PROFILE: docker
    networks:
      - custom-network
  payment-system:
    container_name: paymentServer
    build: /server-payment/.
    ports:
      - "8092:8080"
    environment:
      SPRING_PROFILE: docker
    networks:
      - custom-network
  order-item:
    container_name: order-item
    build: /server-item/.
    ports:
      - "8093:8080"
    environment:
      SPRING_PROFILE: docker
    networks:
      - custom-network
networks:
  custom-network:
    driver: bridge